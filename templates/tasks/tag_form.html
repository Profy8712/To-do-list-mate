{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-4">
    <h2>{% if object %}Update Tag{% else %}Add Tag{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        {% crispy form %}
    </form>
    <a href="{% url 'tasks:tag_list' %}" class="btn btn-secondary mt-2">Cancel</a>
</div>
{% endblock %}
